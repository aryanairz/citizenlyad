name: Render Video

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Ensure Remotion browser
        run: npx remotion browser ensure

      - name: Type-check
        run: npm run typecheck

      - name: Render French H.264 video
        run: npm run render:github

      - name: Render Spanish H.264 video
        run: npm run render:spanish:github

      - name: Verify outputs
        run: |
          test -s out/citizenly-french-ad.mp4
          test -s out/citizenly-spanish-ad.mp4

      - name: Upload French artifact
        uses: actions/upload-artifact@v4
        with:
          name: citizenly-french-ad
          path: out/citizenly-french-ad.mp4
          if-no-files-found: error
          retention-days: 14

      - name: Upload Spanish artifact
        uses: actions/upload-artifact@v4
        with:
          name: citizenly-spanish-ad
          path: out/citizenly-spanish-ad.mp4
          if-no-files-found: error
          retention-days: 14
