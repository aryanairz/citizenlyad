name: Render Video

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install ffmpeg and fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-noto fonts-noto-cjk fonts-noto-color-emoji
          fc-cache -f

      - name: Install dependencies
        run: npm install

      - name: Render video
        run: npx remotion render EightLanguages out/eight-languages.mp4

      - name: Upload MP4 artifact
        uses: actions/upload-artifact@v4
        with:
          name: eight-languages-video
          path: out/eight-languages.mp4
          retention-days: 30
